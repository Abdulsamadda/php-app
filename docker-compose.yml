version: '3.8'

services:
  app:
    build: .
    container_name: php-app
    ports:
      - "8090:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: firstdb
    ports:
      - "3306:3306"